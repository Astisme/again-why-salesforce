<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Tutorial Preview</title>
		<link rel="stylesheet" href="../src/salesforce/css/tutorial.css" />
		<style>
			body {
				margin: 0;
				min-height: 100vh;
				background: linear-gradient(
					180deg,
					#eef3fb 0%,
					#dce8f7 100%
				);
				font-family: Arial, sans-serif;
			}
			.mock-target {
				position: fixed;
				top: 96px;
				left: 72px;
				padding: 12px 18px;
				background: #fff;
				border: 1px solid #c9d6ea;
				border-radius: 8px;
			}
		</style>
	</head>
	<body>
		<div class="mock-target awsf-tutorial-highlight">
			Highlighted setup tab
		</div>
		<div class="awsf-tutorial">
			<div class="awsf-tutorial-corner awsf-tutorial-corner-tl"></div>
			<div class="awsf-tutorial-corner awsf-tutorial-corner-tr"></div>
			<div class="awsf-tutorial-corner awsf-tutorial-corner-bl"></div>
			<div class="awsf-tutorial-corner awsf-tutorial-corner-br"></div>
			<div class="awsf-tutorial-header">
				<div class="awsf-tutorial-tag">Tutorial</div>
				<div class="awsf-tutorial-dash"></div>
			</div>
			<div class="awsf-tutorial-segments">
				<div>
					Use the tutorial to pin and manage your Salesforce setup
					tabs.
				</div>
				<div class="awsf-tutorial-pills">
					<a
						class="awsf-tutorial-pill awsf-tutorial-pill-link"
						href="#"
					>https://github.com/Astisme/again-why-salesforce/wiki/Manage-Tabs-modal</a>
					<span class="awsf-tutorial-pill awsf-tutorial-pill-shortcut"
					>Ctrl+Shift+Y</span>
				</div>
			</div>
			<div class="awsf-tutorial-actions">
				<button>Confirm</button>
			</div>
		</div>
	</body>
</html>
